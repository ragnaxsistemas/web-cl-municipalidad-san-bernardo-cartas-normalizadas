<div class="container">
  <h2>Adjuntar archivo Normalizado</h2>

  <mat-card class="upload-card mat-elevation-z4">
    <mat-card-content>
      <div class="drop-zone" 
           [class.dragging]="isDragging()"
           (dragover)="onDragOver($event)"
           (dragleave)="onDragLeave($event)"
           (drop)="onDrop($event)">
        
        <mat-icon color="primary" class="big-icon">
          {{ archivoCsvAdjunto() ? 'check_circle' : 'cloud_upload' }}
        </mat-icon>
        
        <p *ngIf="!archivoCsvAdjunto()">Seleccione el archivo recibido por Correos de Chile (NORMALIZADO)</p>
        <p *ngIf="archivoCsvAdjunto()" class="file-name">
          <strong>CSV cargado:</strong> {{ archivoCsvAdjunto()?.name }}
        </p>

        <div class="upload-form">
          <input type="file" #csvInput style="display: none" 
                 accept=".csv" (change)="onFileSelected($event)">
          
          <div class="actions-container">
            <button mat-flat-button color="accent" (click)="csvInput.click()" [disabled]="cargando()">
              <mat-icon>attach_file</mat-icon>
              {{ archivoCsvAdjunto() ? 'CAMBIAR ARCHIVO' : 'SELECCIONAR CSV' }}
            </button>

            <button mat-raised-button 
                    color="primary" 
                    (click)="generarCartasFinales()" 
                    [disabled]="!archivoCsvAdjunto() || cargando()">
              <mat-icon *ngIf="!cargando()">auto_fix_high</mat-icon>
              <mat-spinner diameter="20" *ngIf="cargando()" style="margin-right: 8px;"></mat-spinner>
              GENERAR CARTAS FINALES
           </button>
          </div>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>

<ng-template #loadingDialog>
  <div class="loading-container" style="padding: 20px; text-align: center;">
    <h3 mat-dialog-title>Generando Cartas Finales</h3>
    <mat-dialog-content>
      <p>Generando cartas finales Estamos Trabajando para Usted.</p>
      <mat-progress-spinner mode="indeterminate" diameter="50" style="margin: 0 auto;"></mat-progress-spinner>
    </mat-dialog-content>
  </div>
</ng-template>
