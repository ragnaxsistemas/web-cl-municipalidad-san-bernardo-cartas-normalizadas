<div class="login-container">
  <mat-card class="login-card">
    <div class="login-header">
      <img src="assets/images/logo-san-bernardo.png" alt="IMSB" class="logo">
      <h1>Sistema de Cartas</h1>
      <p>Municipalidad de San Bernardo</p>
    </div>

    <mat-card-content>
      <form (submit)="onLogin()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correo Electrónico</mat-label>
          <input matInput type="email" name="email" [(ngModel)]="loginData.username" required>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" name="password" [(ngModel)]="loginData.password" required>
        </mat-form-field>

        <button mat-flat-button class="btn-imsb" type="submit" [disabled]="loading()">
        {{ loading() ? 'INGRESANDO...' : 'INGRESAR' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
