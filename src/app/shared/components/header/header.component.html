<mat-toolbar class="imsb-header">
  <button mat-icon-button (click)="onToggleSidebar()">
    <mat-icon>apps</mat-icon>
  </button>
  
  <span>IMSB - Sistema de Cartas</span>

  <span class="spacer"></span>

  <div class="user-info" *ngIf="authService.user() as user">
    <span class="user-name">{{ user.nombre }} {{ user.apellidoPaterno }}</span>

    <span class="business-unit">
      {{ user.unidadNegocio.nombreUnidad | uppercase }}
    </span>
    
    <button mat-flat-button class="btn-logout" (click)="authService.logout()">
      SALIR
    </button>
  </div>
</mat-toolbar>
